name: Deploy Static Portfolio to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force Clean Linux Native Installation
        run: |
          rm -f package-lock.json
          npm install

      - name: Build Optimized Production Bundle
        run: npm run build

      - name: Initialize Pages Environment
        uses: actions/configure-pages@v4

      - name: Upload Compiled Distribution Bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages Execution
        id: deployment
        uses: actions/deploy-pages@v4